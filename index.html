<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADOC-UERN | Plataforma Ambulatorial</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#fdfbf7',
                        wine: {
                            800: '#5c1a1b',
                            900: '#4a1516'
                        },
                        accent: {
                            yellow: '#fbbf24',
                            orange: '#ea580c'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <!-- Babel para compilar JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK Compat Version para uso no Browser sem Node.js -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fdfbf7;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const Icon = ({ name, className }) => {
            return <i data-lucide={name} className={className}></i>;
        };

        const MOCK_PATIENTS = [
            { id: 1, name: "Maria Silva Costa", record: "2026-001", form: "Cardíaca", treatmentDays: 145, lastEcg: "2024-05-10", lastEcho: "2025-01-12", age: 54, region: "Apodi - RN" },
            { id: 2, name: "João Pedro Santos", record: "2026-002", form: "Indeterminada", treatmentDays: 32, lastEcg: "2026-02-01", lastEcho: "2026-02-15", age: 41, region: "Mossoró - RN" },
            { id: 3, name: "Ana Beatriz Rocha", record: "2026-003", form: "Digestiva", treatmentDays: 410, lastEcg: "2025-02-20", lastEcho: "2024-11-05", age: 62, region: "Caraúbas - RN" },
            { id: 4, name: "Carlos Eduardo Moura", record: "2026-004", form: "Mista", treatmentDays: 89, lastEcg: "2025-10-10", lastEcho: "2025-10-10", age: 58, region: "Umarizal - RN" },
        ];

        const Badge = ({ children, variant = 'default' }) => {
            const variants = {
                default: 'bg-gray-100 text-gray-800',
                wine: 'bg-wine-800 text-white',
                warning: 'bg-accent-yellow text-wine-900 border border-accent-yellow',
                danger: 'bg-red-100 text-red-800 border border-red-200',
                success: 'bg-green-100 text-green-800 border border-green-200'
            };
            return (
                <span className={`px-2.5 py-0.5 rounded-full text-xs font-medium ${variants[variant]}`}>
                    {children}
                </span>
            );
        };

        // --- TELA DO PRONTUÁRIO (NOVO ATENDIMENTO) ---
        const EMRForm = ({ patient, onBack }) => {
            const [activeTab, setActiveTab] = React.useState('anamnese');
            const [smartText, setSmartText] = React.useState('');
            const [isGenerating, setIsGenerating] = React.useState(false);

            // Calculadoras
            const [rassiScore, setRassiScore] = React.useState(0);
            const [cti, setCti] = React.useState({ heartWidth: '', thoraxWidth: '', result: null });

            const calculateRassi = (e, points) => {
                if (e.target.checked) setRassiScore(prev => prev + points);
                else setRassiScore(prev => prev - points);
            };

            const calculateCTI = () => {
                const h = parseFloat(cti.heartWidth);
                const t = parseFloat(cti.thoraxWidth);
                if (h && t && t > 0) {
                    setCti(prev => ({ ...prev, result: (h / t).toFixed(2) }));
                }
            };

            const simulateSmartWrite = () => {
                setIsGenerating(true);
                setTimeout(() => {
                    const mockEvolution = `EVOLUÇÃO MÉDICA - ${new Date().toLocaleDateString('pt-BR')}\n\nPACIENTE: ${patient?.name || 'Paciente Não Identificado'}\n\nS: Paciente refere dispneia aos médios esforços e palpitações esporádicas. Nega síncope.\nO: BEG, CHAAA, acianótico. ACV: RCR em 2T, BNF, sem sopros. FC 78 bpm. PA 120/80 mmHg.\nA: Doença de Chagas - Forma Cardíaca. Condição estável no momento.\nP: Manter medicações atuais. Solicito novo Holter 24h e ECG. Retorno em 6 meses.`;
                    setSmartText(mockEvolution);
                    setIsGenerating(false);
                }, 2000);
            };

            const handleDocsGeneration = async () => {
                const senha = prompt("Para gerar o documento no Drive, digite a senha de acesso (4 dígitos):");
                if (senha !== "14/03" && senha !== "1403") {
                    if (senha !== null) alert("Senha incorreta! Geração de documento cancelada.");
                    return;
                }

                let webAppUrl = localStorage.getItem('adoc_gas_url');
                
                if (!webAppUrl) {
                    webAppUrl = prompt("PRIMEIRO ACESSO:\nPara criar o documento real no seu Drive, cole a URL do seu Google Apps Script (App da Web):\n\nFique tranquilo, o sistema vai memorizar esse link para você não precisar digitar de novo.");
                    
                    if (!webAppUrl || !webAppUrl.startsWith("http")) {
                        if (webAppUrl !== null) alert("URL do Apps Script inválida.");
                        return;
                    }
                    localStorage.setItem('adoc_gas_url', webAppUrl);
                }
                
                try {
                    // Tenta capturar os valores pelos IDs que criamos para a identificação e pelos placeholders padrão
                    const payload = {
                        nome: patient?.name || document.getElementById('patientName')?.value || "Paciente Não Cadastrado",
                        prontuario: patient?.record || document.getElementById('patientRecord')?.value || "Não Informado",
                        formaClinica: patient?.form || document.getElementById('patientClinicalForm')?.value || "Não Informada",
                        procedencia: patient?.region || document.querySelector('input[defaultValue]')?.value || "Não Informada",
                        
                        qp: document.querySelector('input[placeholder^="Ex: Falta de ar"]')?.value || "Não relatada",
                        hma: document.querySelector('textarea[placeholder^="Descreva a evo"]')?.value || "Não relatada",
                        antecedentes: document.querySelector('textarea[placeholder^="HAS, DM"]')?.value || "Não relatados",
                        
                        taipa: document.querySelector('select')?.value || "Não informada",
                        
                        pa: document.querySelector('input[placeholder="120/80"]')?.value || "--",
                        fc: document.querySelector('input[placeholder="75"]')?.value || "--",
                        sat: document.querySelector('input[placeholder="98"]')?.value || "--",
                        peso: document.querySelector('input[placeholder="70"]')?.value || "--",
                        
                        acv: document.querySelector('textarea[placeholder^="Ritmo"]')?.value || "Regular.",
                        ar: document.querySelector('textarea[placeholder^="Murm"]')?.value || "Regular.",
                        
                        rassi: rassiScore,
                        ict: cti.result
                    };

                    alert("Enviando dados para o Google Drive...\nIsso criará a pasta ADOC e o arquivo Word/Docs lá dentro. Aguarde.");

                    const response = await fetch(webAppUrl, {
                        method: 'POST',
                        body: JSON.stringify(payload),
                        headers: {
                            'Content-Type': 'text/plain;charset=utf-8',
                        }
                    });

                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        alert("SUCESSO! Documento Word/Docs criado na pasta ADOC do seu Drive!\nUma aba será aberta agora para você visualizar.");
                        window.open(result.url, '_blank');
                    } else {
                        alert("Erro lá no Drive: " + result.message);
                    }
                } catch (error) {
                    console.error("Erro no Fetch:", error);
                    const reset = confirm("Não foi possível conectar com o seu Google Apps Script.\n(O link que está salvo no sistema pode estar errado, ou a permissão não foi dada para 'Qualquer Pessoa').\n\nDeseja reconfigurar a URL agora?");
                    if (reset) {
                        localStorage.removeItem('adoc_gas_url');
                        handleDocsGeneration();
                    }
                }
            };

            return (
                <div className="animate-in fade-in duration-300">
                    <div className="flex justify-between items-center mb-6">
                        <div className="flex items-center gap-4">
                            <button onClick={onBack} className="p-2 hover:bg-gray-200 rounded-full transition-colors text-gray-600">
                                <Icon name="arrow-left" className="w-6 h-6" />
                            </button>
                            <div>
                                <h2 className="text-2xl font-bold text-gray-900">Novo Atendimento (Prontuário)</h2>
                                {patient ? (
                                    <p className="text-gray-500 font-medium">Paciente: <span className="text-wine-800">{patient.name}</span> | Prontuário: {patient.record} | Procedência: {patient.region}</p>
                                ) : (
                                    <p className="text-gray-500 font-medium text-accent-orange">Selecione um paciente para vincular o atendimento.</p>
                                )}
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <button className="flex items-center gap-2 bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-medium hover:bg-gray-300 transition-colors">
                                <Icon name="save" className="w-4 h-4" /> Salvar Rascunho
                            </button>
                            <button onClick={handleDocsGeneration} className="flex items-center gap-2 bg-wine-800 text-white px-4 py-2 rounded-lg font-medium hover:bg-wine-900 transition-colors shadow-md">
                                <Icon name="file-text" className="w-4 h-4" /> Gerar Documento (Docs)
                            </button>
                        </div>
                    </div>

                    <div className="flex gap-6 h-[calc(100vh-160px)]">
                        {/* Menus do Prontuário */}
                        <div className="w-64 flex flex-col gap-2">
                            {['anamnese', 'epidemiologia', 'exame_fisico', 'calculadoras', 'receita', 'smart_write'].map(tab => {
                                const labels = {
                                    anamnese: 'Anamnese Geral',
                                    epidemiologia: 'Epidemiologia (Chagas)',
                                    exame_fisico: 'Exame Físico / ISDA',
                                    calculadoras: 'Calculadoras Clínicas',
                                    receita: 'Receita Médica / Exames',
                                    smart_write: 'IA Smart Write'
                                };
                                const icons = {
                                    anamnese: 'clipboard-list',
                                    epidemiologia: 'bug',
                                    exame_fisico: 'stethoscope',
                                    calculadoras: 'calculator',
                                    receita: 'pill',
                                    smart_write: 'bot'
                                };
                                return (
                                    <button
                                        key={tab}
                                        onClick={() => setActiveTab(tab)}
                                        className={`flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition-colors text-left ${activeTab === tab ? 'bg-wine-800 text-white shadow-md' : 'bg-white text-gray-600 hover:bg-rose-50'}`}
                                    >
                                        <Icon name={icons[tab]} className="w-5 h-5" />
                                        {labels[tab]}
                                    </button>
                                );
                            })}
                        </div>

                        {/* Conteúdo do Formulário */}
                        <div className="flex-1 glass-card rounded-xl p-6 overflow-y-auto">

                            {activeTab === 'anamnese' && (
                                <div className="space-y-6">
                                    <h3 className="text-xl font-bold text-wine-800 border-b pb-2">Identificação e Queixa</h3>

                                    <div className="grid grid-cols-3 gap-4 bg-rose-50 p-4 rounded-lg border border-rose-100">
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-1">Nome do Paciente</label>
                                            <input type="text" id="patientName" defaultValue={patient?.name || ''} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-wine-800 outline-none" placeholder="Ex: Maria da Silva" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-1">Cód. Prontuário</label>
                                            <input type="text" id="patientRecord" defaultValue={patient?.record || ''} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-wine-800 outline-none" placeholder="Ex: PR-2026-001" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-1">Forma Clínica</label>
                                            <input type="text" id="patientClinicalForm" defaultValue={patient?.form || ''} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-wine-800 outline-none" placeholder="Ex: Cardíaca" />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-1">Queixa Principal (QP)</label>
                                        <input type="text" className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-wine-800 outline-none" placeholder="Ex: Falta de ar aos esforços..." />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-1">História da Moléstia Atual (HMA)</label>
                                        <textarea rows="6" className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-wine-800 outline-none" placeholder="Descreva a evolução cronológica dos sintomas..." />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-1">Antecedentes Pessoais (Comorbidades)</label>
                                        <textarea rows="3" className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-wine-800 outline-none" placeholder="HAS, DM, procedimentos cirúrgicos prévios..." />
                                    </div>
                                </div>
                            )}

                            {activeTab === 'epidemiologia' && (
                                <div className="space-y-6">
                                    <h3 className="text-xl font-bold text-wine-800 border-b pb-2">Investigação Epidemiológica</h3>

                                    <div className="grid grid-cols-2 gap-6">
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-2">Procedência (Área Endêmica)</label>
                                            <input type="text" defaultValue={patient ? patient.region : ''} className="w-full p-3 border border-gray-300 rounded-lg bg-gray-50" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-2">Morou em casa de taipa?</label>
                                            <select className="w-full p-3 border border-gray-300 rounded-lg">
                                                <option>Selecione...</option>
                                                <option>Sim</option>
                                                <option>Não</option>
                                                <option>Desconhece</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div className="bg-rose-50 p-4 rounded-lg border border-rose-100">
                                        <h4 className="font-semibold text-wine-900 mb-3">Contato com o Vetor (Barbeiro)</h4>
                                        <div className="space-y-2">
                                            <label className="flex items-center gap-2 text-gray-700 cursor-pointer">
                                                <input type="checkbox" className="w-4 h-4 text-wine-800" /> Relata ter visto o animal dentro de casa
                                            </label>
                                            <label className="flex items-center gap-2 text-gray-700 cursor-pointer">
                                                <input type="checkbox" className="w-4 h-4 text-wine-800" /> Relata ter sido picado pelo animal
                                            </label>
                                            <label className="flex items-center gap-2 text-gray-700 cursor-pointer">
                                                <input type="checkbox" className="w-4 h-4 text-wine-800" /> Familiares com diagnóstico positivo para Chagas
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'exame_fisico' && (
                                <div className="space-y-6">
                                    <h3 className="text-xl font-bold text-wine-800 border-b pb-2">Exame Físico e ISDA</h3>

                                    <div className="grid grid-cols-4 gap-4">
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-1">PA (mmHg)</label>
                                            <input type="text" placeholder="120/80" className="w-full p-3 border border-gray-300 rounded-lg" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-1">FC (bpm)</label>
                                            <input type="number" placeholder="75" className="w-full p-3 border border-gray-300 rounded-lg" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-1">SatO2 (%)</label>
                                            <input type="number" placeholder="98" className="w-full p-3 border border-gray-300 rounded-lg" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-1">Peso (kg)</label>
                                            <input type="number" placeholder="70" className="w-full p-3 border border-gray-300 rounded-lg" />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="flex justify-between items-end mb-1">
                                            <span className="text-sm font-semibold text-gray-700">Aparelho Cardiovascular (ACV)</span>
                                            <button className="text-xs text-accent-orange font-medium hover:underline">Autopreencher Normal</button>
                                        </label>
                                        <textarea rows="2" className="w-full p-3 border border-gray-300 rounded-lg" placeholder="Ritmo, bulhas, sopros, turgência jugular..." />
                                    </div>

                                    <div>
                                        <label className="flex justify-between items-end mb-1">
                                            <span className="text-sm font-semibold text-gray-700">Aparelho Respiratório (AR)</span>
                                        </label>
                                        <textarea rows="2" className="w-full p-3 border border-gray-300 rounded-lg" placeholder="Murmúrio vesicular, ruídos adventícios..." />
                                    </div>
                                </div>
                            )}

                            {activeTab === 'calculadoras' && (
                                <div className="space-y-8">
                                    <h3 className="text-xl font-bold text-wine-800 border-b pb-2">Calculadoras de Risco Clínico</h3>

                                    {/* Escore de Rassi */}
                                    <div className="bg-white border rounded-xl overflow-hidden shadow-sm">
                                        <div className="bg-gray-50 p-4 border-b flex justify-between items-center">
                                            <h4 className="font-bold text-gray-900 flex items-center gap-2"><Icon name="activity" className="w-5 h-5 text-red-500" /> Escore de Rassi</h4>
                                            <div className="flex items-center gap-3">
                                                <span className="text-sm text-gray-500">Pontuação Total:</span>
                                                <span className={`text-xl font-bold px-3 py-1 rounded bg-wine-800 text-white`}>{rassiScore}</span>
                                            </div>
                                        </div>
                                        <div className="p-4 space-y-3">
                                            <p className="text-sm text-gray-600 mb-4">Selecione os critérios presentes no paciente para avaliar o risco de mortalidade na doença de Chagas.</p>
                                            {[
                                                { label: "Classe funcional III ou IV (NYHA)", points: 5 },
                                                { label: "Cardiomegalia ao Raio-X", points: 5 },
                                                { label: "Disfunção ventricular global ou segmentar ao ECO", points: 3 },
                                                { label: "Taquicardia ventricular não sustentada (TVNS) no Holter", points: 3 },
                                                { label: "Baixa voltagem do QRS no ECG", points: 2 },
                                                { label: "Sexo masculino", points: 2 }
                                            ].map((item, idx) => (
                                                <label key={idx} className="flex items-center justify-between p-3 border rounded-lg hover:bg-gray-50 cursor-pointer transition-colors">
                                                    <div className="flex items-center gap-3">
                                                        <input type="checkbox" onChange={(e) => calculateRassi(e, item.points)} className="w-5 h-5 text-wine-800 rounded focus:ring-wine-800" />
                                                        <span className="font-medium text-gray-700">{item.label}</span>
                                                    </div>
                                                    <Badge variant="warning">+{item.points} pts</Badge>
                                                </label>
                                            ))}

                                            {/* Interpretação Rassi */}
                                            <div className="mt-4 p-4 rounded-lg bg-gray-50 border">
                                                <p className="text-sm font-bold text-gray-900 mb-1">Risco Associado:</p>
                                                {rassiScore <= 6 && <p className="text-success text-green-700">Baixo Risco (0 a 6 pontos) - Mortalidade em 10 anos: ~10%</p>}
                                                {rassiScore >= 7 && rassiScore <= 11 && <p className="text-warning text-yellow-700">Risco Intermediário (7 a 11 pontos) - Mortalidade em 10 anos: ~44%</p>}
                                                {rassiScore >= 12 && <p className="text-danger text-red-700 font-bold">Alto Risco (12 a 20 pontos) - Mortalidade em 10 anos: ~84%</p>}
                                            </div>
                                        </div>
                                    </div>

                                    {/* Índice Cardiotorácico */}
                                    <div className="bg-white border rounded-xl overflow-hidden shadow-sm mb-8">
                                        <div className="bg-gray-50 p-4 border-b">
                                            <h4 className="font-bold text-gray-900 flex items-center gap-2"><Icon name="monitor" className="w-5 h-5 text-blue-500" /> Índice Cardiotorácico (ICT)</h4>
                                        </div>
                                        <div className="p-4 flex gap-6 items-start">
                                            <div className="flex-1 space-y-4">
                                                <p className="text-sm text-gray-600">Com base no Raio-X de Tórax, insira as medidas para avaliar cardiomegalia.</p>
                                                <div className="flex items-center gap-4">
                                                    <div className="flex-1">
                                                        <label className="block text-xs font-semibold text-gray-500 mb-1">Diâmetro Cardíaco Max (A+B)</label>
                                                        <input type="number" step="0.1" value={cti.heartWidth} onChange={e => setCti({ ...cti, heartWidth: e.target.value })} className="w-full p-2 border rounded" placeholder="cm" />
                                                    </div>
                                                    <div className="flex-1">
                                                        <label className="block text-xs font-semibold text-gray-500 mb-1">Diâmetro Torácico Max (C)</label>
                                                        <input type="number" step="0.1" value={cti.thoraxWidth} onChange={e => setCti({ ...cti, thoraxWidth: e.target.value })} className="w-full p-2 border rounded" placeholder="cm" />
                                                    </div>
                                                </div>
                                                <button onClick={calculateCTI} className="px-4 py-2 bg-gray-900 text-white rounded shadow text-sm font-medium hover:bg-gray-800">Calcular ICT</button>
                                            </div>
                                            <div className="w-48 p-4 bg-gray-50 rounded-lg flex flex-col items-center justify-center border text-center h-full min-h-[140px]">
                                                <span className="text-sm text-gray-500 mb-1">Resultado ICT:</span>
                                                <span className="text-3xl font-black text-wine-900">{cti.result || '--'}</span>
                                                {cti.result && (
                                                    <span className={`text-xs mt-2 font-bold px-2 py-1 rounded-full ${cti.result > 0.5 ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`}>
                                                        {parseFloat(cti.result) > 0.5 ? 'Cardiomegalia' : 'Normal (≤ 0.5)'}
                                                    </span>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'receita' && (
                                <div className="space-y-6 h-full flex flex-col">
                                    <div className="flex justify-between items-center border-b pb-2">
                                        <h3 className="text-xl font-bold text-wine-800 flex items-center gap-2">
                                            <Icon name="pill" className="w-6 h-6" />
                                            Receita Médica e Exames
                                        </h3>
                                        <div className="flex gap-2">
                                            <button className="text-sm bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium px-4 py-1.5 rounded-lg transition-colors flex items-center gap-2">
                                                <Icon name="printer" className="w-4 h-4" />
                                                Imprimir Receita
                                            </button>
                                            <button className="text-sm bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium px-4 py-1.5 rounded-lg transition-colors flex items-center gap-2">
                                                <Icon name="file-text" className="w-4 h-4" />
                                                Pedidos de Exame
                                            </button>
                                        </div>
                                    </div>

                                    <div className="flex-1 flex gap-6">
                                        <div className="flex-1 space-y-4">
                                            <h4 className="font-semibold text-gray-900 border-b pb-1">Uso Interno (Comprimidos/Cápsulas)</h4>

                                            <div className="space-y-3">
                                                <div className="flex gap-2 items-start">
                                                    <div className="flex-1">
                                                        <input type="text" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-wine-800 outline-none text-sm font-bold text-gray-800" defaultValue="Benznidazol 100mg" placeholder="Nome da Medicação e Dosagem" />
                                                    </div>
                                                    <div className="w-24">
                                                        <input type="text" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-wine-800 outline-none text-sm" defaultValue="60 comp" placeholder="Qtd" />
                                                    </div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <div className="w-8 flex justify-center text-gray-400">
                                                        <Icon name="corner-down-right" className="w-4 h-4 mt-2" />
                                                    </div>
                                                    <textarea rows="2" className="flex-1 p-2 border border-gray-300 bg-gray-50 rounded focus:ring-2 focus:ring-wine-800 outline-none text-sm" defaultValue="Tomar 01 comprimido via oral após o café da manhã e 01 comprimido após o jantar, durante 60 dias." placeholder="Posologia / Instruções de uso"></textarea>
                                                </div>
                                            </div>

                                            <button className="text-sm text-wine-800 font-bold hover:text-accent-orange flex items-center gap-1 mt-2">
                                                <Icon name="plus-circle" className="w-4 h-4" /> Adicionar Medicação
                                            </button>

                                            <h4 className="font-semibold text-gray-900 border-b pb-1 mt-8">Pedidos de Exames</h4>
                                            <textarea rows="4" className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-wine-800 outline-none text-sm text-gray-700" placeholder="Ex: Solicito Eletrocardiograma (ECG) de repouso, Ecocardiograma Transtorácico, Hemograma Completo..."></textarea>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'smart_write' && (
                                <div className="space-y-6 h-full flex flex-col">
                                    <div className="flex justify-between items-center border-b pb-2">
                                        <h3 className="text-xl font-bold text-wine-800 flex items-center gap-2">
                                            <Icon name="sparkles" className="w-6 h-6 text-accent-yellow" />
                                            IA Smart Write (Gemini)
                                        </h3>
                                    </div>

                                    <p className="text-gray-600 text-sm">
                                        Digite anotações soltas, rápidos lembretes da consulta ou áudio transcrito. A Inteligência Artificial irá estruturar automaticamente no padrão de Evolução Técnica.
                                    </p>

                                    <div className="flex-1 flex gap-6">
                                        <div className="flex-1 flex flex-col gap-3">
                                            <label className="text-sm font-bold text-gray-700 flex justify-between">
                                                Anotações Brutas
                                                <button className="text-accent-orange hover:underline">Limpar</button>
                                            </label>
                                            <textarea
                                                className="flex-1 p-4 border border-gray-300 rounded-lg resize-none focus:ring-2 focus:ring-wine-800 text-gray-700"
                                                placeholder="Ex: pct cansado, ta com falta de ar ao varrer a casa. coracao rcr. pressao 12/8. pedir holter proxima vez"
                                            ></textarea>
                                            <button
                                                onClick={simulateSmartWrite}
                                                disabled={isGenerating}
                                                className={`py-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-all ${isGenerating ? 'bg-gray-400 cursor-not-allowed text-white' : 'bg-gradient-to-r from-wine-800 to-accent-orange text-white shadow-lg hover:shadow-xl hover:scale-[1.01]'}`}
                                            >
                                                {isGenerating ? <Icon name="loader-2" className="w-5 h-5 animate-spin" /> : <Icon name="wand-2" className="w-5 h-5" />}
                                                {isGenerating ? 'Processando com Gemini...' : 'Transformar em Evolução SOAP'}
                                            </button>
                                        </div>

                                        <div className="w-12 flex items-center justify-center">
                                            <Icon name="arrow-right" className="w-8 h-8 text-gray-300" />
                                        </div>

                                        <div className="flex-1 flex flex-col gap-3">
                                            <label className="text-sm font-bold text-gray-700">Evolução Estruturada (Editável)</label>
                                            <div className="flex-1 relative">
                                                <textarea
                                                    value={smartText}
                                                    onChange={(e) => setSmartText(e.target.value)}
                                                    className="w-full h-full p-4 border-2 border-accent-yellow/50 bg-stone-50 rounded-lg resize-none focus:ring-2 focus:ring-accent-yellow outline-none text-gray-800 font-medium"
                                                    placeholder="A evolução estruturada aparecerá aqui..."
                                                ></textarea>
                                                {smartText && (
                                                    <button className="absolute top-3 right-3 p-2 bg-white rounded shadow text-gray-600 hover:text-wine-800 tooltip" title="Copiar para área de transferência">
                                                        <Icon name="copy" className="w-4 h-4" />
                                                    </button>
                                                )}
                                            </div>
                                            <button className="py-3 bg-white border-2 border-gray-200 text-gray-700 rounded-lg font-bold hover:bg-gray-50 transition-colors">
                                                Copiar para Prontuário
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        };

        // --- DASHBOARD PRINCIPAL ---
        const Dashboard = ({ onNavigate, onPatientSelect, patients, loadingPatients }) => {
            const [searchTerm, setSearchTerm] = React.useState('');

            const checkExamAlert = (dateString) => {
                const examDate = new Date(dateString);
                const today = new Date('2026-03-13');
                const diffDays = Math.ceil(Math.abs(today - examDate) / (1000 * 60 * 60 * 24));
                return diffDays > 365;
            };

            const filteredPatients = patients.filter(p =>
                p.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                p.record.includes(searchTerm) ||
                p.form.toLowerCase().includes(searchTerm.toLowerCase())
            );

            return (
                <main className="flex-1 overflow-y-auto p-8 bg-cream animate-in slide-in-from-bottom-4 duration-500">
                    <div className="flex justify-between items-end mb-8">
                        <div>
                            <h2 className="text-3xl font-bold text-gray-900 tracking-tight">Dashboard de Pacientes</h2>
                            <p className="text-gray-500 mt-1">Gerencie os atendimentos e acompanhe os indicadores clínicos.</p>
                        </div>
                        <button
                            onClick={() => onNavigate('form')}
                            className="flex items-center gap-2 bg-accent-orange hover:bg-orange-600 text-white px-5 py-2.5 rounded-lg shadow-md font-medium transition-transform hover:scale-105"
                        >
                            <Icon name="plus" className="w-5 h-5" />
                            Novo Atendimento
                        </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                        <div className="glass-card rounded-xl p-6 border-l-4 border-wine-800">
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-sm font-medium text-gray-500">Total de Pacientes</p>
                                    <h3 className="text-3xl font-bold text-gray-900 mt-1">124</h3>
                                </div>
                                <div className="p-2 bg-rose-100 rounded-lg text-wine-800"><Icon name="users" className="w-6 h-6" /></div>
                            </div>
                        </div>
                        <div className="glass-card rounded-xl p-6 border-l-4 border-accent-yellow">
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-sm font-medium text-gray-500">Agendados Hoje</p>
                                    <h3 className="text-3xl font-bold text-gray-900 mt-1">8</h3>
                                </div>
                                <div className="p-2 bg-yellow-100 rounded-lg text-accent-orange"><Icon name="calendar" className="w-6 h-6" /></div>
                            </div>
                        </div>
                        <div className="glass-card rounded-xl p-6 border-l-4 border-red-500">
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-sm font-medium text-gray-500">Alerta de Exames</p>
                                    <h3 className="text-3xl font-bold text-red-600 mt-1">12</h3>
                                </div>
                                <div className="p-2 bg-red-100 rounded-lg text-red-600"><Icon name="activity" className="w-6 h-6" /></div>
                            </div>
                        </div>
                        <div className="glass-card rounded-xl p-6 border-l-4 border-green-500">
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-sm font-medium text-gray-500">Docs. Google Gerados</p>
                                    <h3 className="text-3xl font-bold text-gray-900 mt-1">340</h3>
                                </div>
                                <div className="p-2 bg-green-100 rounded-lg text-green-600"><Icon name="file-check" className="w-6 h-6" /></div>
                            </div>
                        </div>
                    </div>

                    <div className="glass-card rounded-xl overflow-hidden shadow-sm">
                        <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-white">
                            <h3 className="text-lg font-semibold text-gray-900">Busca Rápida</h3>
                            <div className="relative w-96">
                                <Icon name="search" className="w-5 h-5 text-gray-400 absolute left-3 top-1/2 transform -translate-y-1/2" />
                                <input
                                    type="text"
                                    placeholder="Buscar por nome, prontuário..."
                                    className="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-wine-800 transition-shadow"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                        </div>

                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm text-gray-600">
                                <thead className="text-xs text-gray-500 uppercase bg-gray-50 border-b border-gray-100">
                                    <tr>
                                        <th className="px-6 py-4 font-semibold">Prontuário</th>
                                        <th className="px-6 py-4 font-semibold">Nome do Paciente</th>
                                        <th className="px-6 py-4 font-semibold">Forma Clínica</th>
                                        <th className="px-6 py-4 font-semibold">Tempo de Trat.</th>
                                        <th className="px-6 py-4 font-semibold">Status Exames</th>
                                        <th className="px-6 py-4 text-right font-semibold">Ação</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredPatients.map(patient => {
                                        const ecgAlert = checkExamAlert(patient.lastEcg);
                                        const echoAlert = checkExamAlert(patient.lastEcho);
                                        const hasAlert = ecgAlert || echoAlert;

                                        return (
                                            <tr key={patient.id} className="border-b border-gray-50 hover:bg-gray-50/50 transition-colors">
                                                <td className="px-6 py-4 font-medium text-gray-900">{patient.record}</td>
                                                <td className="px-6 py-4 font-bold text-wine-800">{patient.name}</td>
                                                <td className="px-6 py-4"><Badge variant={patient.form === 'Indeterminada' ? 'default' : 'wine'}>{patient.form}</Badge></td>
                                                <td className="px-6 py-4">{patient.treatmentDays} dias</td>
                                                <td className="px-6 py-4">
                                                    {hasAlert ? (
                                                        <div className="flex gap-2">
                                                            {ecgAlert && <Badge variant="danger" title={`Último ECG: ${patient.lastEcg}`}>ECG Vencido</Badge>}
                                                            {echoAlert && <Badge variant="danger" title={`Último ECO: ${patient.lastEcho}`}>ECO Vencido</Badge>}
                                                        </div>
                                                    ) : (
                                                        <Badge variant="success">Atualizados</Badge>
                                                    )}
                                                </td>
                                                <td className="px-6 py-4 text-right">
                                                    <button
                                                        onClick={() => onPatientSelect(patient)}
                                                        className="text-white bg-wine-800 px-3 py-1.5 rounded-lg hover:bg-accent-orange font-semibold transition-colors flex items-center justify-end gap-1 ml-auto"
                                                    >
                                                        <Icon name="stethoscope" className="w-4 h-4" /> Atender
                                                    </button>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                    {loadingPatients && (
                                        <tr><td colSpan="6" className="text-center py-12 text-wine-800 font-semibold"><Icon name="loader" className="w-5 h-5 animate-spin mx-auto mb-2" /> Carregando pacientes do Google Drive...</td></tr>
                                    )}
                                    {!loadingPatients && filteredPatients.length === 0 && (
                                        <tr><td colSpan="6" className="text-center py-8 text-gray-500">Nenhum paciente encontrado.</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </main>
            );
        };

        const PatientsList = ({ onNavigate, patients, loadingPatients }) => {
            const [searchTerm, setSearchTerm] = React.useState('');
            const filteredPatients = patients.filter(p =>
                p.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                p.record.includes(searchTerm) ||
                p.form.toLowerCase().includes(searchTerm.toLowerCase())
            );

            const handlePatientClick = (patient) => {
                const senha = prompt(`Acessar Drive do(a) paciente ${patient.name}:\nDigite a senha (4 dígitos):`);
                if (senha === "14/03" || senha === "1403") {
                    window.open("https://drive.google.com/drive/my-drive", "_blank");
                } else if (senha !== null) {
                    alert("Senha incorreta! Acesso negado.");
                }
            };

            return (
                <main className="flex-1 overflow-y-auto p-8 bg-cream animate-in slide-in-from-bottom-4 duration-500">
                    <div className="flex justify-between items-end mb-8">
                        <div>
                            <h2 className="text-3xl font-bold text-gray-900 tracking-tight">Banco de Pacientes</h2>
                            <p className="text-gray-500 mt-1">Busque pacientes e acesse a pasta do Drive correspondente.</p>
                        </div>
                    </div>

                    <div className="relative w-full max-w-md mb-8">
                        <Icon name="search" className="w-5 h-5 text-gray-400 absolute left-3 top-1/2 transform -translate-y-1/2" />
                        <input
                            type="text"
                            placeholder="Buscar por nome, prontuário ou forma clínica..."
                            className="w-full pl-10 pr-4 py-3 border border-gray-200 shadow-sm rounded-lg focus:outline-none focus:ring-2 focus:ring-wine-800 transition-shadow"
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                        />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                        {filteredPatients.map(patient => (
                            <div 
                                key={patient.id} 
                                onClick={() => handlePatientClick(patient)}
                                className="glass-card rounded-xl p-6 border-t-4 border-w text-left cursor-pointer hover:shadow-lg transition-all hover:scale-[1.02] bg-white group"
                                style={{ borderTopColor: '#5c1a1b' }}
                            >
                                <div className="flex justify-between items-start mb-4">
                                    <div className="flex-1">
                                        <h3 className="text-lg font-bold text-wine-900 group-hover:text-accent-orange transition-colors">{patient.name}</h3>
                                        <p className="text-sm font-semibold text-gray-500 mt-1">Prontuário: {patient.record}</p>
                                    </div>
                                    <div className="p-2 bg-rose-50 rounded-lg text-wine-800 group-hover:bg-orange-50 group-hover:text-accent-orange transition-colors">
                                        <Icon name="folder-lock" className="w-6 h-6" />
                                    </div>
                                </div>
                                <div className="space-y-2 text-sm text-gray-600">
                                    <p><span className="font-semibold text-gray-800">Forma Clínica:</span> <Badge variant={patient.form === 'Indeterminada' ? 'default' : 'wine'}>{patient.form}</Badge></p>
                                    <p><span className="font-semibold text-gray-800">Idade:</span> {patient.age} anos</p>
                                    <p><span className="font-semibold text-gray-800">Procedência:</span> {patient.region}</p>
                                </div>
                                <div className="mt-6 pt-4 border-t border-gray-100 flex items-center justify-between text-xs font-semibold text-gray-400">
                                    <span>Clique para acessar os arquivos docs</span>
                                    <span className="flex items-center gap-1"><Icon name="external-link" className="w-4 h-4" /> Drive</span>
                                </div>
                            </div>
                        ))}
                        {loadingPatients && (
                            <div className="col-span-full py-16 text-center text-wine-800 font-semibold flex flex-col items-center justify-center">
                                <Icon name="loader" className="w-8 h-8 animate-spin mb-3 text-accent-orange" />
                                <p>Sincronizando com o Google Drive...</p>
                            </div>
                        )}
                        {!loadingPatients && filteredPatients.length === 0 && (
                            <div className="col-span-full py-12 text-center text-gray-500">Nenhum paciente encontrado.</div>
                        )}
                    </div>
                </main>
            );
        };

        // --- APLICAÇÃO GERAL (ROTEADOR SIMPLES) ---
        const App = () => {
            const [currentView, setCurrentView] = React.useState('dashboard');
            const [selectedPatient, setSelectedPatient] = React.useState(null);
            const [patients, setPatients] = React.useState(MOCK_PATIENTS);
            const [loadingPatients, setLoadingPatients] = React.useState(false);

            // Atualizar os ícones do Lucide a cada mudança de view
            React.useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            React.useEffect(() => {
                const fetchPatients = async () => {
                    setLoadingPatients(true);
                    try {
                        const url = "https://script.google.com/macros/s/AKfycbytY8e0r3D6bN5A-g0R5oN78QjKItL5-V-79Rz54QzK33lR3JzVJw64lO46Xk9rQvTzpw/exec";
                        const response = await fetch(url);
                        const result = await response.json();
                        if (result.status === 'success' && result.patients && result.patients.length > 0) {
                            setPatients(result.patients);
                        }
                    } catch (error) {
                        console.error("Erro ao buscar pacientes do Drive:", error);
                    } finally {
                        setLoadingPatients(false);
                    }
                };
                fetchPatients();
            }, []);

            const handleNavigate = (view) => {
                if (view === 'dashboard' || view === 'patients') setSelectedPatient(null);
                setCurrentView(view);
            };

            const handlePatientSelect = (patient) => {
                setSelectedPatient(patient);
                setCurrentView('form');
            };

            return (
                <div className="h-screen flex flex-col overflow-hidden">
                    <header className="bg-white border-b border-gray-200 shrink-0 z-20 relative shadow-sm">

                            <div className="flex items-center gap-4 cursor-pointer" onClick={() => handleNavigate('dashboard')}>

                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold text-wine-800 leading-tight hover:text-accent-orange transition-colors">Ambulatório de Doença de Chagas</h1>
                                    <p className="text-sm text-gray-500 font-medium">Universidade do Estado do Rio Grande do Norte (UERN)</p>
                                </div>
                            </div>

                            <div className="flex items-center gap-4">
                                <div className="text-right">
                                    <p className="text-sm font-semibold text-gray-900">Dr(a). Médico(a)</p>
                                    <p className="text-xs text-gray-500">Membro da Equipe</p>
                                </div>
                                <button className="p-2 text-rose-200 bg-wine-800 rounded-full hover:bg-red-600 hover:text-white transition-colors" title="Sair">
                                    <Icon name="log-out" className="w-5 h-5" />
                                </button>
                            </div>
                        </div>
                    </header>

                    <div className="flex flex-1 overflow-hidden relative">
                        <aside className="w-64 bg-wine-900 text-white shadow-xl flex flex-col z-10 shrink-0 transition-all">
                            <nav className="flex-1 py-6 px-4 space-y-2">
                                <button
                                    onClick={() => handleNavigate('dashboard')}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition-colors ${currentView === 'dashboard' ? 'bg-wine-800 border-l-4 border-accent-yellow text-white' : 'text-rose-200 hover:bg-wine-800 hover:text-white'}`}
                                >
                                    <Icon name="layout-dashboard" className="w-5 h-5" /> Dashboard
                                </button>
                                <button
                                    onClick={() => handleNavigate('patients')}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition-colors ${currentView === 'patients' ? 'bg-wine-800 border-l-4 border-accent-yellow text-white' : 'text-rose-200 hover:bg-wine-800 hover:text-white'}`}
                                >
                                    <Icon name="users" className="w-5 h-5" /> Pacientes
                                </button>
                                <button
                                    onClick={() => handleNavigate('form')}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition-colors ${currentView === 'form' ? 'bg-wine-800 border-l-4 border-accent-yellow text-white' : 'text-rose-200 hover:bg-wine-800 hover:text-white'}`}
                                >
                                    <Icon name="file-text" className="w-5 h-5" /> Novo Prontuário
                                </button>
                                <button
                                    onClick={() => {
                                        const senha = prompt("Digite a senha (4 dígitos) para acessar o Drive:");
                                        if (senha === "14/03" || senha === "1403") {
                                            window.open("https://drive.google.com/drive/my-drive", "_blank");
                                        } else if (senha !== null) {
                                            alert("Senha incorreta! Acesso negado.");
                                        }
                                    }}
                                    className="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-rose-200 hover:bg-wine-800 hover:text-white transition-colors"
                                >
                                    <Icon name="folder" className="w-5 h-5" /> Acessar Drive
                                </button>
                            </nav>
                            <div className="p-4">
                                <button className="w-full flex items-center justify-center gap-2 px-4 py-2 bg-rose-950 text-rose-200 rounded-lg hover:text-white hover:bg-black/20 transition-colors text-sm">
                                    <Icon name="log-out" className="w-4 h-4" /> Sair
                                </button>
                            </div>
                        </aside>

                        {currentView === 'dashboard' && <Dashboard onNavigate={handleNavigate} onPatientSelect={handlePatientSelect} patients={patients} loadingPatients={loadingPatients} />}
                        {currentView === 'patients' && <PatientsList onNavigate={handleNavigate} patients={patients} loadingPatients={loadingPatients} />}
                        {currentView === 'form' && (
                            <div className="flex-1 p-8 bg-cream overflow-hidden">
                                <EMRForm patient={selectedPatient} onBack={() => handleNavigate('dashboard')} />
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
